  name: String
  type: CategoryType
}

input UpdateMatchInput {
  categoryId: ID
  date: DateTime
  id: ID!
  isHome: Boolean = true
  location: String
  notes: String
  rivalName: String

  """Estado inicial del partido (SCHEDULED, PLAYED, etc)"""
  status: String
}

input UpdateNoticeInput {
  content: String
  image: String
  status: String
  summary: String
  title: String
}

input UpdatePlanLimitInput {
  allowsFinance: Boolean
  allowsGlobalLib: Boolean
  allowsStore: Boolean
  maxCategories: Int
  maxCoaches: Int
  maxStudents: Int
}

input UpdatePlayerInput {
  active: Boolean
  birthDate: DateTime
  categoryId: ID
  firstName: String
  guardianId: ID
  lastName: String
  medicalInfo: String
  photoUrl: String
  position: PlayerPosition
  scholarship: Boolean = false
  schoolId: ID
}

input UpdateProductInput {
  active: Boolean
  description: String
  imageUrl: String
  name: String
  price: Float
  schoolId: ID
  stock: Int
}

input UpdateSchoolInput {
  bankDetails: String
  logoUrl: String
  mode: SchoolMode = COMMERCIAL
  name: String
  planType: PlanType = SEMILLERO

  """Sin espacios, solo letras, números y guiones"""
  slug: String
  subscriptionStatus: String
}

input UpdateStrategyInput {
  description: String
  drawingData: String
  id: String!
  title: String
  tokens: JSON
}

input UpdateTacticalBoardInput {
  animation: JSON
  categoryId: ID
  coachId: ID
  description: String
  id: ID!
  initialState: JSON
  tags: [String!]
  title: String
}

input UpdateTrainingSessionInput {
  categoryId: ID
  date: DateTime

  """IDs de los ejercicios"""
  exerciseIds: [ID!]
  location: String
  notes: String

  """IDs de las pizarras tácticas"""
  tacticalBoardIds: [ID!]
  title: String
}

input UpdateUserInput {
  email: String
  fullName: String
  isActive: Boolean

  """Mínimo 6 caracteres"""
  password: String
  phone: String
  role: UserRole = GUARDIAN
  schoolId: ID
}

type UserEntity {
  coachProfile: CoachEntity
  createdAt: DateTime!
  email: String!
  fullName: String!
  id: ID!
  isActive: Boolean!
  managedPlayers: [PlayerEntity!]
  phone: String
  role: UserRole!
  school: SchoolEntity
  schoolId: ID
  schools: [SchoolStaff!]
  sub: ID
  updatedAt: DateTime!
}

enum UserRole {
  COACH
  DIRECTOR
  GUARDIAN
  SUBADMIN
  SUPERADMIN
}